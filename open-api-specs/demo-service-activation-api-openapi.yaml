openapi: 3.0.3
info:
  title: Demo Service Activation API
  description: |
    Demo service representing a service activation system. Handles activation
    of new services, such as mobile plans and broadband connections, against
    existing customer accounts, and tracks activation progress.

    Customer accounts are owned by the Demo Customer API. Successful
    activations result in billing line items raised through the Demo
    Billing API.

    This is a demonstration API used to showcase automated Postman onboarding.
    It does not connect to any real systems.

    **Authentication:**
    - Internal services: JWT token (Bearer token)
  version: 1.0.0
  contact:
    name: Platform Engineering (Demo)
    email: platform-demo@example.com

servers:
  - url: https://api.demo.example.com/activation/v1
    description: Production environment
  - url: https://api-staging.demo.example.com/activation/v1
    description: Staging environment
  - url: https://api-preprod.demo.example.com/activation/v1
    description: ProProd environment

tags:
  - name: Activations
    description: Operations for requesting and managing service activations
  - name: Activation Status
    description: Operations for tracking activation progress
  - name: Health
    description: Service health checks

security:
  - JWT: []

paths:
  /activations:
    post:
      tags:
        - Activations
      summary: Request a service activation
      description: |
        Requests activation of a new service for an existing customer.
        The customer ID must refer to an active customer in the Demo
        Customer API. The activation starts in 'pending' status and moves
        through 'provisioning' to 'completed' or 'failed'.

        On completion, the service appears against the customer in the
        Demo Customer API and billing begins through the Demo Billing API.
      operationId: createActivation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateActivationRequest'
            examples:
              mobile_activation:
                summary: Mobile plan activation
                value:
                  customerId: "cust_a1b2c3d4"
                  serviceType: "mobile"
                  planCode: "DEMO-MOB-50GB"
                  simSerial: "8961000000000000001"
              broadband_activation:
                summary: Broadband activation
                value:
                  customerId: "cust_a1b2c3d4"
                  serviceType: "broadband"
                  planCode: "DEMO-NBN-100"
                  installationAddress:
                    line1: "1 Demo Street"
                    suburb: "Sydney"
                    state: "NSW"
                    postcode: "2000"
                    country: "AU"
      responses:
        '201':
          description: Activation request created successfully
          headers:
            Location:
              description: URI of the created activation resource
              schema:
                type: string
                format: uri
              example: "/activations/act_q1w2e3r4"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivationResponse'
              examples:
                created:
                  summary: Activation request accepted
                  value:
                    activationId: "act_q1w2e3r4"
                    customerId: "cust_a1b2c3d4"
                    serviceType: "mobile"
                    planCode: "DEMO-MOB-50GB"
                    status: "pending"
                    requestedAt: "2026-06-01T10:00:00Z"
                    updatedAt: "2026-06-01T10:00:00Z"
                    estimatedCompletionTime: "2026-06-01T10:15:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                customer_not_found:
                  summary: Customer does not exist
                  value:
                    error: "CUSTOMER_NOT_FOUND"
                    message: "The specified customer was not found in the customer service"
                    details:
                      customerId: "cust_invalid01"
                    code: "RESOURCE_NOT_FOUND"
                    timestamp: "2026-06-01T10:00:00Z"
        '409':
          description: Conflict - duplicate activation in progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicate_activation:
                  summary: Activation already in progress
                  value:
                    error: "ACTIVATION_IN_PROGRESS"
                    message: "An activation for this plan is already in progress for this customer"
                    details:
                      customerId: "cust_a1b2c3d4"
                      existingActivationId: "act_existing01"
                    code: "CONFLICT"
                    timestamp: "2026-06-01T10:00:00Z"
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      tags:
        - Activation Status
      summary: List activations
      description: |
        Retrieves a paginated list of activation requests. Supports filtering
        by customer ID, status, and service type. Results are sorted by
        request date in descending order.
      operationId: listActivations
      parameters:
        - $ref: '#/components/parameters/CustomerIdFilter'
        - $ref: '#/components/parameters/StatusFilter'
        - $ref: '#/components/parameters/ServiceTypeFilter'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Successful response with activation list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivationListResponse'
              examples:
                activations_found:
                  summary: Activations found
                  value:
                    activations:
                      - activationId: "act_q1w2e3r4"
                        customerId: "cust_a1b2c3d4"
                        serviceType: "mobile"
                        planCode: "DEMO-MOB-50GB"
                        status: "completed"
                        requestedAt: "2026-06-01T10:00:00Z"
                        updatedAt: "2026-06-01T10:12:00Z"
                        completedAt: "2026-06-01T10:12:00Z"
                        serviceId: "svc_m0b1l3"
                    pagination:
                      page: 1
                      pageSize: 20
                      totalPages: 1
                      totalItems: 1
                      hasNext: false
                      hasPrevious: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /activations/{activationId}:
    get:
      tags:
        - Activation Status
      summary: Get activation details
      description: |
        Retrieves an activation request by its ID, including its status
        history. Completed activations include the resulting service ID,
        which can be looked up in the Demo Customer API.
      operationId: getActivation
      parameters:
        - $ref: '#/components/parameters/ActivationId'
      responses:
        '200':
          description: Activation details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivationDetailResponse'
              examples:
                completed_activation:
                  summary: Completed activation
                  value:
                    activationId: "act_q1w2e3r4"
                    customerId: "cust_a1b2c3d4"
                    serviceType: "mobile"
                    planCode: "DEMO-MOB-50GB"
                    status: "completed"
                    requestedAt: "2026-06-01T10:00:00Z"
                    updatedAt: "2026-06-01T10:12:00Z"
                    completedAt: "2026-06-01T10:12:00Z"
                    serviceId: "svc_m0b1l3"
                    statusHistory:
                      - status: "pending"
                        timestamp: "2026-06-01T10:00:00Z"
                        message: "Activation request received"
                      - status: "provisioning"
                        timestamp: "2026-06-01T10:02:00Z"
                        message: "Network provisioning started"
                      - status: "completed"
                        timestamp: "2026-06-01T10:12:00Z"
                        message: "Service activated"
                failed_activation:
                  summary: Failed activation
                  value:
                    activationId: "act_failed01"
                    customerId: "cust_a1b2c3d4"
                    serviceType: "broadband"
                    planCode: "DEMO-NBN-100"
                    status: "failed"
                    requestedAt: "2026-06-01T09:00:00Z"
                    updatedAt: "2026-06-01T09:20:00Z"
                    failedAt: "2026-06-01T09:20:00Z"
                    failureReason: "Address not serviceable for requested plan"
                    failureCode: "ADDRESS_NOT_SERVICEABLE"
                    statusHistory:
                      - status: "pending"
                        timestamp: "2026-06-01T09:00:00Z"
                        message: "Activation request received"
                      - status: "provisioning"
                        timestamp: "2026-06-01T09:05:00Z"
                        message: "Network provisioning started"
                      - status: "failed"
                        timestamp: "2026-06-01T09:20:00Z"
                        message: "Activation failed: Address not serviceable for requested plan"
        '404':
          $ref: '#/components/responses/ActivationNotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /activations/{activationId}/cancel:
    post:
      tags:
        - Activations
      summary: Cancel a pending activation
      description: |
        Cancels an activation that is in 'pending' status. Once provisioning
        has started, the activation cannot be cancelled.
      operationId: cancelActivation
      parameters:
        - $ref: '#/components/parameters/ActivationId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for cancellation
                  maxLength: 500
                  example: "Customer changed plan selection"
      responses:
        '200':
          description: Activation cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivationResponse'
              examples:
                cancelled:
                  summary: Activation cancelled
                  value:
                    activationId: "act_q1w2e3r4"
                    customerId: "cust_a1b2c3d4"
                    serviceType: "mobile"
                    planCode: "DEMO-MOB-50GB"
                    status: "cancelled"
                    requestedAt: "2026-06-01T10:00:00Z"
                    updatedAt: "2026-06-01T10:05:00Z"
                    cancelledAt: "2026-06-01T10:05:00Z"
                    cancellationReason: "Customer changed plan selection"
        '400':
          description: Bad request - cannot cancel activation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                cannot_cancel:
                  summary: Provisioning already started
                  value:
                    error: "ACTIVATION_CANNOT_BE_CANCELLED"
                    message: "Only pending activations can be cancelled"
                    details:
                      activationId: "act_q1w2e3r4"
                      currentStatus: "provisioning"
                      allowedStatuses: ["pending"]
                    code: "VALIDATION_ERROR"
                    timestamp: "2026-06-01T10:05:00Z"
        '404':
          $ref: '#/components/responses/ActivationNotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns the health status of the activation service.
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, degraded, unhealthy]
                    example: "healthy"
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-06-01T10:00:00Z"
                  version:
                    type: string
                    example: "1.0.0"
              examples:
                healthy:
                  summary: Service healthy
                  value:
                    status: "healthy"
                    timestamp: "2026-06-01T10:00:00Z"
                    version: "1.0.0"

components:
  securitySchemes:
    JWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT token authentication for internal services. Tokens must include
        the 'activations' scope.

  parameters:
    ActivationId:
      name: activationId
      in: path
      required: true
      description: Unique identifier for the activation request
      schema:
        type: string
        pattern: '^act_[a-zA-Z0-9]+$'
        example: "act_q1w2e3r4"
    CustomerIdFilter:
      name: customerId
      in: query
      description: Filter activations by customer ID
      schema:
        type: string
        pattern: '^cust_[a-zA-Z0-9]+$'
        example: "cust_a1b2c3d4"
    StatusFilter:
      name: status
      in: query
      description: Filter activations by status
      schema:
        type: string
        enum: [pending, provisioning, completed, failed, cancelled]
        example: "pending"
    ServiceTypeFilter:
      name: serviceType
      in: query
      description: Filter activations by service type
      schema:
        type: string
        enum: [mobile, broadband, voice]
        example: "mobile"
    PageNumber:
      name: page
      in: query
      description: Page number for pagination (1-based)
      schema:
        type: integer
        minimum: 1
        default: 1
        example: 1
    PageSize:
      name: pageSize
      in: query
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
        example: 20

  schemas:
    CreateActivationRequest:
      type: object
      required:
        - customerId
        - serviceType
        - planCode
      properties:
        customerId:
          type: string
          description: Customer ID from the Demo Customer API
          pattern: '^cust_[a-zA-Z0-9]+$'
          example: "cust_a1b2c3d4"
        serviceType:
          type: string
          enum: [mobile, broadband, voice]
          example: "mobile"
        planCode:
          type: string
          description: Plan code to activate
          pattern: '^DEMO-[A-Z0-9-]+$'
          example: "DEMO-MOB-50GB"
        simSerial:
          type: string
          description: SIM serial number (mobile activations only)
          pattern: '^[0-9]{19}$'
          example: "8961000000000000001"
        installationAddress:
          $ref: '#/components/schemas/Address'

    ActivationResponse:
      type: object
      properties:
        activationId:
          type: string
          pattern: '^act_[a-zA-Z0-9]+$'
          example: "act_q1w2e3r4"
        customerId:
          type: string
          pattern: '^cust_[a-zA-Z0-9]+$'
          example: "cust_a1b2c3d4"
        serviceType:
          type: string
          enum: [mobile, broadband, voice]
          example: "mobile"
        planCode:
          type: string
          example: "DEMO-MOB-50GB"
        status:
          type: string
          enum: [pending, provisioning, completed, failed, cancelled]
          example: "pending"
        requestedAt:
          type: string
          format: date-time
          example: "2026-06-01T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-06-01T10:00:00Z"
        completedAt:
          type: string
          format: date-time
          description: Timestamp when the activation completed (if applicable)
          example: "2026-06-01T10:12:00Z"
        cancelledAt:
          type: string
          format: date-time
          description: Timestamp when the activation was cancelled (if applicable)
          example: "2026-06-01T10:05:00Z"
        failedAt:
          type: string
          format: date-time
          description: Timestamp when the activation failed (if applicable)
          example: "2026-06-01T09:20:00Z"
        estimatedCompletionTime:
          type: string
          format: date-time
          description: Estimated completion time (for pending or provisioning activations)
          example: "2026-06-01T10:15:00Z"
        cancellationReason:
          type: string
          description: Reason for cancellation (if applicable)
          example: "Customer changed plan selection"
        failureReason:
          type: string
          description: Reason for failure (if applicable)
          example: "Address not serviceable for requested plan"
        failureCode:
          type: string
          description: Error code for failure (if applicable)
          example: "ADDRESS_NOT_SERVICEABLE"
        serviceId:
          type: string
          description: |
            Service ID created on completion. This ID appears against the
            customer in the Demo Customer API.
          pattern: '^svc_[a-zA-Z0-9]+$'
          example: "svc_m0b1l3"

    ActivationDetailResponse:
      allOf:
        - $ref: '#/components/schemas/ActivationResponse'
        - type: object
          properties:
            statusHistory:
              type: array
              description: History of status changes
              items:
                $ref: '#/components/schemas/StatusHistoryEntry'

    ActivationListResponse:
      type: object
      properties:
        activations:
          type: array
          items:
            $ref: '#/components/schemas/ActivationResponse'
        pagination:
          $ref: '#/components/schemas/Pagination'

    StatusHistoryEntry:
      type: object
      properties:
        status:
          type: string
          enum: [pending, provisioning, completed, failed, cancelled]
          example: "pending"
        timestamp:
          type: string
          format: date-time
          example: "2026-06-01T10:00:00Z"
        message:
          type: string
          example: "Activation request received"

    Address:
      type: object
      properties:
        line1:
          type: string
          example: "1 Demo Street"
        suburb:
          type: string
          example: "Sydney"
        state:
          type: string
          example: "NSW"
        postcode:
          type: string
          example: "2000"
        country:
          type: string
          example: "AU"

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20
        totalPages:
          type: integer
          example: 1
        totalItems:
          type: integer
          example: 1
        hasNext:
          type: boolean
          example: false
        hasPrevious:
          type: boolean
          example: false

    ErrorResponse:
      type: object
      required:
        - error
        - message
        - code
        - timestamp
      properties:
        error:
          type: string
          example: "ACTIVATION_NOT_FOUND"
        message:
          type: string
          example: "The specified activation was not found"
        details:
          type: object
          additionalProperties: true
        code:
          type: string
          enum: [VALIDATION_ERROR, AUTHENTICATION_ERROR, RESOURCE_NOT_FOUND, CONFLICT, SERVER_ERROR]
          example: "RESOURCE_NOT_FOUND"
        timestamp:
          type: string
          format: date-time
          example: "2026-06-01T10:00:00Z"

  responses:
    BadRequest:
      description: Bad request - invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validation_error:
              summary: Validation error
              value:
                error: "VALIDATION_ERROR"
                message: "Invalid request parameters"
                details:
                  field: "planCode"
                  issue: "Unknown plan code"
                code: "VALIDATION_ERROR"
                timestamp: "2026-06-01T10:00:00Z"
    Unauthorized:
      description: Unauthorized - invalid or missing authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorized:
              summary: Authentication required
              value:
                error: "UNAUTHORIZED"
                message: "Authentication token is required"
                code: "AUTHENTICATION_ERROR"
                timestamp: "2026-06-01T10:00:00Z"
    ActivationNotFound:
      description: Activation not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            activation_not_found:
              summary: Activation does not exist
              value:
                error: "ACTIVATION_NOT_FOUND"
                message: "The specified activation was not found"
                details:
                  activationId: "act_invalid01"
                code: "RESOURCE_NOT_FOUND"
                timestamp: "2026-06-01T10:00:00Z"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            internal_error:
              summary: Internal server error
              value:
                error: "INTERNAL_SERVER_ERROR"
                message: "An unexpected error occurred"
                code: "SERVER_ERROR"
                timestamp: "2026-06-01T10:00:00Z"
