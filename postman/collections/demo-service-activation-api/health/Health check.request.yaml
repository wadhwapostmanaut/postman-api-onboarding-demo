type: http
name: Health check
url: '{{baseUrl}}/health'
method: GET
headers:
  - key: Accept
    value: application/json
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "status": "healthy",
            "timestamp": "2026-06-01T10:00:00Z",
            "version": "1.0.0"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Service is healthy
