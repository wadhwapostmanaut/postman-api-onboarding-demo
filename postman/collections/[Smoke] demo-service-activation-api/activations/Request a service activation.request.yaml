type: http
name: Request a service activation
url: '{{baseUrl}}/activations'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "customerId": "cust_a1b2c3d4",
      "serviceType": "mobile",
      "planCode": "DEMO-MOB-50GB",
      "simSerial": "8961000000000000001"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "activationId": "act_q1w2e3r4",
            "customerId": "cust_a1b2c3d4",
            "serviceType": "mobile",
            "planCode": "DEMO-MOB-50GB",
            "status": "pending",
            "requestedAt": "2026-06-01T10:00:00Z",
            "updatedAt": "2026-06-01T10:00:00Z",
            "estimatedCompletionTime": "2026-06-01T10:15:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
        - key: Location
          value: /activations/act_q1w2e3r4
          description: URI of the created activation resource
          disabled: false
    name: Activation request created successfully
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "error": "VALIDATION_ERROR",
            "message": "Invalid request parameters",
            "details": {
              "field": "planCode",
              "issue": "Unknown plan code"
            },
            "code": "VALIDATION_ERROR",
            "timestamp": "2026-06-01T10:00:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Bad request - invalid input
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: json
        content: |-
          {
            "error": "UNAUTHORIZED",
            "message": "Authentication token is required",
            "code": "AUTHENTICATION_ERROR",
            "timestamp": "2026-06-01T10:00:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Unauthorized - invalid or missing authentication
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "CUSTOMER_NOT_FOUND",
            "message": "The specified customer was not found in the customer service",
            "details": {
              "customerId": "cust_invalid01"
            },
            "code": "RESOURCE_NOT_FOUND",
            "timestamp": "2026-06-01T10:00:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Customer not found
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "error": "ACTIVATION_IN_PROGRESS",
            "message": "An activation for this plan is already in progress for this customer",
            "details": {
              "customerId": "cust_a1b2c3d4",
              "existingActivationId": "act_existing01"
            },
            "code": "CONFLICT",
            "timestamp": "2026-06-01T10:00:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Conflict - duplicate activation in progress
  - response:
      statusCode: 500
      statusText: Internal Server Error
      body:
        type: json
        content: |-
          {
            "error": "INTERNAL_SERVER_ERROR",
            "message": "An unexpected error occurred",
            "code": "SERVER_ERROR",
            "timestamp": "2026-06-01T10:00:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Internal server error
