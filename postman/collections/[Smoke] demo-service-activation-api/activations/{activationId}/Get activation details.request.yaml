type: http
name: Get activation details
url: '{{baseUrl}}/activations/:activationId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: activationId
    value: act_q1w2e3r4
    description: Unique identifier for the activation request
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "activationId": "act_q1w2e3r4",
            "customerId": "cust_a1b2c3d4",
            "serviceType": "mobile",
            "planCode": "DEMO-MOB-50GB",
            "status": "completed",
            "requestedAt": "2026-06-01T10:00:00Z",
            "updatedAt": "2026-06-01T10:12:00Z",
            "completedAt": "2026-06-01T10:12:00Z",
            "serviceId": "svc_m0b1l3",
            "statusHistory": [
              {
                "status": "pending",
                "timestamp": "2026-06-01T10:00:00Z",
                "message": "Activation request received"
              },
              {
                "status": "provisioning",
                "timestamp": "2026-06-01T10:02:00Z",
                "message": "Network provisioning started"
              },
              {
                "status": "completed",
                "timestamp": "2026-06-01T10:12:00Z",
                "message": "Service activated"
              }
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Activation details retrieved successfully
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: json
        content: |-
          {
            "error": "UNAUTHORIZED",
            "message": "Authentication token is required",
            "code": "AUTHENTICATION_ERROR",
            "timestamp": "2026-06-01T10:00:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Unauthorized - invalid or missing authentication
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "ACTIVATION_NOT_FOUND",
            "message": "The specified activation was not found",
            "details": {
              "activationId": "act_invalid01"
            },
            "code": "RESOURCE_NOT_FOUND",
            "timestamp": "2026-06-01T10:00:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Activation not found
  - response:
      statusCode: 500
      statusText: Internal Server Error
      body:
        type: json
        content: |-
          {
            "error": "INTERNAL_SERVER_ERROR",
            "message": "An unexpected error occurred",
            "code": "SERVER_ERROR",
            "timestamp": "2026-06-01T10:00:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Internal server error
