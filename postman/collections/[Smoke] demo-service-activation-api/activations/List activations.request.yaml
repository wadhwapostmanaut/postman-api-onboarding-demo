type: http
name: List activations
url: '{{baseUrl}}/activations?customerId=cust_a1b2c3d4&status=pending&serviceType=mobile&page=1&pageSize=20'
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: customerId
    value: cust_a1b2c3d4
    description: Filter activations by customer ID
  - key: status
    value: pending
    description: Filter activations by status
  - key: serviceType
    value: mobile
    description: Filter activations by service type
  - key: page
    value: '1'
    description: Page number for pagination (1-based)
  - key: pageSize
    value: '20'
    description: Number of items per page
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
